<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluency • Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Calibri', sans-serif;
            background: linear-gradient(145deg, #e2f0ff 0%, #fafcff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
        }
        
        .login-box {
            background: white;
            border-radius: 2.5rem;
            padding: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0,40,80,0.3);
            text-align: center;
        }
        
        .login-box h2 {
            color: #1e5a88;
            margin-bottom: 2rem;
            font-size: 2rem;
        }
        
        .login-box input {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 60px;
            border: 2px solid #c7ddef;
            font-size: 1rem;
            margin: 0.5rem 0;
            outline: none;
        }
        
        .login-box input:focus {
            border-color: #1e5a88;
            box-shadow: 0 0 0 3px rgba(30,90,136,0.1);
        }
        
        .login-box button {
            width: 100%;
            padding: 1rem;
            border-radius: 60px;
            border: none;
            background: linear-gradient(115deg, #1e5a88, #367bb5);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin: 1rem 0;
        }
        
        .error-msg {
            color: #cc3366;
            margin-top: 1rem;
        }
        
        .admin-panel {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 2.5rem;
            padding: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,40,80,0.3);
        }
        
        .admin-panel h2 {
            color: #1e5a88;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .admin-section {
            background: rgba(220, 240, 255, 0.3);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .admin-section h3 {
            color: #175277;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .form-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        
        .form-group input,
        .form-group textarea {
            flex: 1;
            padding: 0.8rem 1rem;
            border-radius: 50px;
            border: 1px solid #c7ddef;
            font-size: 0.95rem;
            outline: none;
        }
        
        .form-group textarea {
            border-radius: 1rem;
            min-height: 100px;
            font-family: 'Calibri', sans-serif;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #1e5a88;
            box-shadow: 0 0 0 2px rgba(30,90,136,0.1);
        }
        
        .btn {
            background: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #1e4f7a;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(45, 100, 150, 0.1);
            border: 1px solid #c7ddef;
        }
        
        .btn-primary {
            background: linear-gradient(115deg, #1e5a88, #367bb5);
            color: white;
            border: none;
        }
        
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 16px rgba(30,90,136,0.2);
        }
        
        .btn-danger {
            background: #cc3366;
            color: white;
            border: none;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
            border: none;
        }
        
        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .preview-box {
            background: #f0f7ff;
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px solid #c7ddef;
        }
        
        .timestamp {
            color: #5f7d9c;
            font-size: 0.85rem;
            text-align: right;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #c7ddef;
        }
        
        .help-text {
            color: #5f7d9c;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }
        
        .icon-preview {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            background: #c1dcf5;
        }
        
        .icon-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .stat-card {
            background: white;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #1e5a88;
        }

        .stat-label {
            color: #5f7d9c;
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h2><i class="fa-regular fa-lock"></i> Admin Login</h2>
            <input type="email" id="adminEmail" placeholder="Email">
            <input type="password" id="adminPassword" placeholder="Password" onkeypress="if(event.key==='Enter') checkPassword()">
            <button onclick="checkPassword()">Login to Dashboard</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>
    
    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel" style="display: none;">
        <h2>
            <i class="fa-regular fa-gear"></i>
            Lesson Control Panel
            <span style="margin-left: auto; font-size: 0.9rem;">
                <i class="fa-regular fa-clock"></i> <span id="liveTimestamp"></span>
            </span>
        </h2>

        <!-- Dashboard Stats -->
        <div class="admin-section">
            <h3><i class="fa-regular fa-chart-line"></i> Dashboard</h3>
            <div class="stats-grid" id="dashboardStats">
                <div class="stat-card">
                    <div class="stat-number" id="totalUsers">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="todayActive">0</div>
                    <div class="stat-label">Active Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalLessons">0</div>
                    <div class="stat-label">Lessons Completed</div>
                </div>
            </div>
        </div>
        
        <!-- Top Performer Settings -->
        <div class="admin-section">
            <h3><i class="fa-regular fa-crown"></i> Top Performer (Manual Control)</h3>
            <p class="help-text">This section is independent from the student data table.</p>
            
            <div class="form-group">
                <input type="text" id="topPerformerName" placeholder="Student Name" value="Hatim" style="flex: 2;">
                <input type="number" id="topPerformerPoints" placeholder="Points" value="71" min="0" style="flex: 1;">
            </div>
            
            <div class="form-group">
                <input type="text" id="topPerformerBadge" placeholder="Badge text" value="Most consistent learner this month" style="flex: 3;">
            </div>
            
            <div class="form-group">
                <input type="text" id="topPerformerAvatar" placeholder="Avatar Image URL" value="https://i.ibb.co/4RQ0RChK/hatim.jpg" style="flex: 3;">
            </div>
            
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="saveTopPerformer()"><i class="fa-regular fa-floppy-disk"></i> Save Top Performer</button>
                <button class="btn" onclick="resetTopPerformer()"><i class="fa-regular fa-arrow-rotate-left"></i> Reset</button>
            </div>
        </div>
        
        <!-- Lesson Settings -->
        <div class="admin-section">
            <h3><i class="fa-regular fa-key"></i> Lesson Settings</h3>
            <div class="form-group">
                <input type="text" id="lessonCode" placeholder="Lesson Code" value="1234" style="flex: 1;">
                <input type="number" id="marks" placeholder="Marks" value="5" min="1" style="flex: 1;">
                <input type="date" id="deadline" style="flex: 1;">
            </div>
            
            <div class="form-group">
                <input type="text" id="videoUrl" placeholder="YouTube Video URL" value="https://www.youtube.com/embed/D3mNn0btW6s">
            </div>
            
            <div class="form-group">
                <textarea id="questions" placeholder="Reflection Questions (one per line)" rows="5">• What are two main ways technology has improved daily life?
• Mention one negative effect of technology discussed.
• How does technology influence communication?</textarea>
            </div>
            
            <div class="form-group">
                <textarea id="reading" placeholder="Reading Passage" rows="8">Technology has transformed almost every aspect of human life over the last few decades. From communication and education to healthcare and entertainment, modern innovations have changed how we live, work, and connect with others. Smartphones, the internet, and artificial intelligence have made information more accessible than ever, allowing people to learn and communicate at a global scale...</textarea>
            </div>
            
            <div class="form-group">
                <textarea id="vocabulary" placeholder="Vocabulary (one per line - format: word – definition)" rows="6">persistence – continuing despite difficulty
momentum – force that keeps something moving
consistency – doing the same thing regularly
exposure – contact with something (e.g. language)
discipline – controlled behaviour to achieve a goal</textarea>
            </div>
            
            <button class="btn btn-primary" onclick="saveLessonSettings()"><i class="fa-regular fa-save"></i> Save Lesson Settings</button>
        </div>

        <!-- User Management -->
        <div class="admin-section">
            <h3><i class="fa-regular fa-users"></i> User Management</h3>
            <button class="btn" onclick="viewUsers()"><i class="fa-regular fa-eye"></i> View All Users</button>
            <button class="btn" onclick="exportData()"><i class="fa-regular fa-file-excel"></i> Export Data</button>
        </div>
        
        <!-- Action Buttons -->
        <div class="button-group">
            <button class="btn btn-success" onclick="saveAllChanges()"><i class="fa-regular fa-floppy-disk"></i> Save All Changes</button>
            <button class="btn" onclick="loadCurrentData()"><i class="fa-regular fa-rotate"></i> Refresh</button>
            <button class="btn" onclick="previewLesson()"><i class="fa-regular fa-eye"></i> Preview Lesson</button>
            <button class="btn btn-danger" onclick="logout()"><i class="fa-regular fa-sign-out"></i> Logout</button>
        </div>
        
        <div class="timestamp" id="lastUpdated">Last saved: Never</div>
    </div>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://gxwqopilkzgvevhaviyz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4d3FvcGlsa3pndmV2aGF2aXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDM4NDMsImV4cCI6MjA4ODQ3OTg0M30.ghpphewyov2iDG9mJF5o_6KPU68_HVm9ChMAaT5fPRw';

        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Admin credentials (you can change these)
        const ADMIN_EMAIL = 'admin@fluency.com';
        const ADMIN_PASSWORD = 'Admin@2024';

        const LESSON_API_URL = 'https://script.google.com/macros/s/AKfycbxYEI-ROn15R3RzhBza9Js_WroAPfwoUbdQ9vooOGyaDKuTY9ApNNndCNs0jd4Sk4ejAA/exec';

        // ============================================
        // LOGIN FUNCTION
        // ============================================
        async function checkPassword() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                await loadCurrentData();
                await loadDashboardStats();
                updateTimestamp();
                showNotification('Welcome, Admin!');
            } else {
                document.getElementById('loginError').innerText = 'Invalid email or password';
            }
        }
        
        function logout() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginError').innerText = '';
        }

        // ============================================
        // DASHBOARD STATS
        // ============================================
        async function loadDashboardStats() {
            try {
                // Get total users
                const { count: totalUsers } = await supabase
                    .from('profiles')
                    .select('*', { count: 'exact', head: true });
                
                // Get today's active users
                const today = new Date().toISOString().split('T')[0];
                const { data: todayProgress } = await supabase
                    .from('user_progress')
                    .select('user_id')
                    .eq('completed_date', today);
                
                const uniqueToday = new Set(todayProgress?.map(p => p.user_id) || []).size;
                
                // Get total lessons completed
                const { count: totalLessons } = await supabase
                    .from('user_progress')
                    .select('*', { count: 'exact', head: true });
                
                document.getElementById('totalUsers').textContent = totalUsers || 0;
                document.getElementById('todayActive').textContent = uniqueToday;
                document.getElementById('totalLessons').textContent = totalLessons || 0;
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        // ============================================
        // TOP PERFORMER FUNCTIONS
        // ============================================
        function loadTopPerformer() {
            const saved = localStorage.getItem('fluencyTopPerformer');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    document.getElementById('topPerformerName').value = data.name || 'Hatim';
                    document.getElementById('topPerformerPoints').value = data.points || 71;
                    document.getElementById('topPerformerBadge').value = data.badge || 'Most consistent learner this month';
                    document.getElementById('topPerformerAvatar').value = data.avatar || 'https://i.ibb.co/4RQ0RChK/hatim.jpg';
                } catch (e) {}
            }
        }
        
        function saveTopPerformer() {
            const data = {
                name: document.getElementById('topPerformerName').value,
                points: parseInt(document.getElementById('topPerformerPoints').value) || 71,
                badge: document.getElementById('topPerformerBadge').value,
                avatar: document.getElementById('topPerformerAvatar').value,
                lastUpdated: new Date().toISOString()
            };
            
            localStorage.setItem('fluencyTopPerformer', JSON.stringify(data));
            showNotification('Top Performer saved!');
        }
        
        function resetTopPerformer() {
            if (confirm('Reset Top Performer to default values?')) {
                localStorage.removeItem('fluencyTopPerformer');
                document.getElementById('topPerformerName').value = 'Hatim';
                document.getElementById('topPerformerPoints').value = 71;
                document.getElementById('topPerformerBadge').value = 'Most consistent learner this month';
                document.getElementById('topPerformerAvatar').value = 'https://i.ibb.co/4RQ0RChK/hatim.jpg';
                showNotification('Reset to default');
            }
        }

        // ============================================
        // LESSON FUNCTIONS
        // ============================================
        function getDefaultDeadline() {
            const date = new Date();
            date.setDate(date.getDate() + 2);
            return date.toISOString().split('T')[0];
        }

        async function loadLessonFromCloud() {
            try {
                const response = await fetch(LESSON_API_URL);
                const result = await response.json();
                
                if (result && result.data) {
                    document.getElementById('lessonCode').value = result.data.lessonCode || '1234';
                    document.getElementById('marks').value = result.data.marks || '5';
                    document.getElementById('deadline').value = result.data.deadline || getDefaultDeadline();
                    document.getElementById('videoUrl').value = result.data.videoUrl || '';
                    document.getElementById('questions').value = result.data.questions || '';
                    document.getElementById('reading').value = result.data.reading || '';
                    document.getElementById('vocabulary').value = result.data.vocabulary || '';
                } else {
                    setDefaultDates();
                }
            } catch (error) {
                loadLocalBackup();
            }
        }

        function loadLocalBackup() {
            const saved = localStorage.getItem('fluencyLessonData');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    document.getElementById('lessonCode').value = data.lessonCode || '1234';
                    document.getElementById('marks').value = data.marks || '5';
                    document.getElementById('deadline').value = data.deadline || getDefaultDeadline();
                    document.getElementById('videoUrl').value = data.videoUrl || '';
                    document.getElementById('questions').value = data.questions || '';
                    document.getElementById('reading').value = data.reading || '';
                    document.getElementById('vocabulary').value = data.vocabulary || '';
                } catch (e) {
                    setDefaultDates();
                }
            } else {
                setDefaultDates();
            }
        }

        function setDefaultDates() {
            document.getElementById('deadline').value = getDefaultDeadline();
        }

        async function saveLessonSettings() {
            const data = {
                lessonCode: document.getElementById('lessonCode').value,
                marks: document.getElementById('marks').value,
                deadline: document.getElementById('deadline').value,
                videoUrl: document.getElementById('videoUrl').value,
                questions: document.getElementById('questions').value,
                reading: document.getElementById('reading').value,
                vocabulary: document.getElementById('vocabulary').value,
                lastUpdated: new Date().toISOString()
            };
            
            localStorage.setItem('fluencyLessonCode', data.lessonCode);
            localStorage.setItem('fluencyLessonData', JSON.stringify(data));
            
            try {
                await fetch(LESSON_API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                showNotification('Lesson settings saved to cloud!');
            } catch (error) {
                showNotification('Saved locally only');
            }
            
            updateTimestamp();
        }

        async function saveAllChanges() {
            await saveLessonSettings();
            saveTopPerformer();
        }

        // ============================================
        // USER MANAGEMENT
        // ============================================
        async function viewUsers() {
            const { data: users, error } = await supabase
                .from('profiles')
                .select('*')
                .limit(100);
            
            if (error) {
                showNotification('Error loading users: ' + error.message, 'error');
                return;
            }
            
            console.log('Users:', users);
            
            // Simple display in console for now
            let message = '=== USERS ===\n';
            users.forEach(u => {
                message += `${u.name || 'No name'} - ${u.id}\n`;
            });
            alert(message);
        }

        async function exportData() {
            const { data: progress, error } = await supabase
                .from('user_progress')
                .select(`
                    *,
                    profiles:user_id (name)
                `);
            
            if (error) {
                showNotification('Error exporting data');
                return;
            }
            
            // Create CSV
            let csv = 'User ID,Lesson ID,Completed Date\n';
            progress.forEach(p => {
                csv += `${p.user_id},${p.lesson_id},${p.completed_date}\n`;
            });
            
            // Download
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `fluency_data_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            
            showNotification('Data exported!');
        }

        // ============================================
        // PREVIEW FUNCTIONS
        // ============================================
        function previewLesson() {
            window.open('index.html', '_blank');
        }

        // ============================================
        // LOAD CURRENT DATA
        // ============================================
        async function loadCurrentData() {
            await loadLessonFromCloud();
            loadTopPerformer();
        }

        // ============================================
        // NOTIFICATION & TIMESTAMP
        // ============================================
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('lastUpdated').innerHTML = `Last saved: ${now.toLocaleString()}`;
            document.getElementById('liveTimestamp').textContent = now.toLocaleTimeString();
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            setDefaultDates();
        });
        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') {
                checkPassword();
            }
        });
        
        setInterval(updateTimestamp, 60000);
    </script>
</body>
</html>
