<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluency • Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        /* Keep all existing styles - they're good */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Calibri', sans-serif;
            background: linear-gradient(145deg, #e2f0ff 0%, #fafcff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-box {
            background: white;
            border-radius: 2.5rem;
            padding: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0,40,80,0.3);
            text-align: center;
        }

        .login-box h2 {
            color: #1e5a88;
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .login-box input {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 60px;
            border: 2px solid #c7ddef;
            font-size: 1rem;
            margin: 0.5rem 0;
            outline: none;
        }

        .login-box input:focus {
            border-color: #1e5a88;
        }

        .login-box button {
            width: 100%;
            padding: 1rem;
            border-radius: 60px;
            border: none;
            background: linear-gradient(115deg, #1e5a88, #367bb5);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin: 1rem 0;
        }

        .error-msg {
            color: #cc3366;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .admin-panel {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 2.5rem;
            padding: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,40,80,0.3);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .admin-header h2 {
            color: #1e5a88;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .live-time {
            font-size: 0.9rem;
            color: #5f7d9c;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            border-bottom: 2px solid #c7ddef;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: #5f7d9c;
            cursor: pointer;
            border-radius: 1rem 1rem 0 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab-btn.active {
            background: #1e5a88;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .section-box {
            background: rgba(220, 240, 255, 0.3);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #c7ddef;
        }

        .section-box h3 {
            color: #175277;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group.full-width {
            flex: 100%;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #1e4f7a;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 50px;
            border: 1px solid #c7ddef;
            font-size: 0.95rem;
            outline: none;
            font-family: 'Calibri', sans-serif;
        }

        .form-group textarea {
            border-radius: 1rem;
            min-height: 100px;
        }

        .btn {
            background: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #1e4f7a;
            cursor: pointer;
            border: 1px solid #c7ddef;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(115deg, #1e5a88, #367bb5);
            color: white;
            border: none;
        }

        .btn-success {
            background: #28a745;
            color: white;
            border: none;
        }

        .btn-danger {
            background: #cc3366;
            color: white;
            border: none;
        }

        .btn-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .preview-box {
            background: #f0f7ff;
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        .top-performer-preview {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: white;
            padding: 1.5rem;
            border-radius: 1.5rem;
        }

        .preview-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            background: #c1dcf5;
        }

        .preview-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            background: #c1dcf5;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #d4edda;
            color: #155724;
            border-radius: 1rem;
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        .sync-status.syncing {
            background: #fff3cd;
            color: #856404;
        }

        .sync-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .video-preview {
            margin-top: 1rem;
            border-radius: 1rem;
            overflow: hidden;
        }

        .video-preview iframe {
            width: 100%;
            height: 300px;
            border: none;
        }

        .timestamp {
            color: #5f7d9c;
            font-size: 0.85rem;
            text-align: right;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #c7ddef;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .admin-panel { padding: 1.5rem; }
            .tabs { flex-direction: column; }
            .tab-btn { width: 100%; justify-content: center; border-radius: 1rem; }
            .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h2><i class="fa-regular fa-lock"></i> Admin Login</h2>
            <input type="password" id="adminPassword" placeholder="Enter password" onkeypress="if(event.key==='Enter') checkPassword()">
            <button onclick="checkPassword()">Login to Dashboard</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel" style="display: none;">
        <div class="admin-header">
            <h2><i class="fa-regular fa-gear"></i> Control Panel</h2>
            <div class="live-time">
                <i class="fa-regular fa-clock"></i>
                <span id="liveTimestamp">--:--</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('performer')">
                <i class="fa-regular fa-crown"></i> Top Performer
            </button>
            <button class="tab-btn" onclick="switchTab('lesson')">
                <i class="fa-regular fa-book"></i> Lesson Settings
            </button>
            <button class="tab-btn" onclick="switchTab('content')">
                <i class="fa-regular fa-pen-to-square"></i> Content
            </button>
            <button class="tab-btn" onclick="switchTab('tools')">
                <i class="fa-regular fa-wrench"></i> Tools
            </button>
        </div>

        <div id="tab-performer" class="tab-content active">
            <div class="section-box">
                <h3><i class="fa-regular fa-crown"></i> Top Performer Settings</h3>
                
                <div class="avatar-upload">
                    <div class="avatar-preview">
                        <img id="adminAvatarPreview" src="https://i.ibb.co/4RQ0RChK/hatim.jpg" alt="Avatar Preview">
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label>Avatar Image URL</label>
                        <input type="text" id="topPerformerAvatar" placeholder="https://example.com/avatar.jpg" onchange="updateAvatarPreview()">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Student Name</label>
                        <input type="text" id="topPerformerName" placeholder="Enter student name">
                    </div>
                    <div class="form-group">
                        <label>Points</label>
                        <input type="number" id="topPerformerPoints" placeholder="Points" min="0" max="1000">
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Badge / Achievement</label>
                    <input type="text" id="topPerformerBadge" placeholder="e.g., Most consistent learner">
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="saveTopPerformer()">
                        <i class="fa-regular fa-cloud-arrow-up"></i> Save & Sync to Cloud
                    </button>
                    <button class="btn" onclick="previewTopPerformer()">
                        <i class="fa-regular fa-eye"></i> Preview
                    </button>
                </div>

                <div id="topPerformerPreview" class="preview-box" style="display: none;">
                    <h4>Live Preview:</h4>
                    <div class="top-performer-preview">
                        <div class="preview-avatar">
                            <img id="previewAvatar" src="" alt="Preview">
                        </div>
                        <div class="preview-info">
                            <h4 id="previewName"></h4>
                            <div class="points" id="previewPoints"></div>
                            <div class="badge" id="previewBadge"></div>
                        </div>
                    </div>
                </div>

                <div id="syncStatus" class="sync-status" style="display: none;">
                    <i class="fa-regular fa-check-circle"></i>
                    <span>Synced to cloud</span>
                </div>
            </div>
        </div>

        <div id="tab-lesson" class="tab-content">
            <div class="section-box">
                <h3><i class="fa-regular fa-key"></i> Basic Settings</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Lesson Code</label>
                        <input type="text" id="lessonCode" placeholder="e.g., 1234" maxlength="4">
                    </div>
                    <div class="form-group">
                        <label>Marks</label>
                        <input type="number" id="marks" placeholder="e.g., 5" min="1" max="20">
                    </div>
                    <div class="form-group">
                        <label>Deadline</label>
                        <input type="date" id="deadline">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="saveBasicSettings()">
                        <i class="fa-regular fa-floppy-disk"></i> Save Settings
                    </button>
                </div>
            </div>

            <div class="section-box">
                <h3><i class="fa-regular fa-film"></i> Video Lesson</h3>
                <div class="form-group full-width">
                    <label>YouTube Video URL or Embed Link</label>
                    <input type="text" id="videoUrl" placeholder="https://www.youtube.com/embed/...">
                </div>
                <div class="btn-group">
                    <button class="btn" onclick="previewVideo()">
                        <i class="fa-regular fa-eye"></i> Preview Video
                    </button>
                    <button class="btn btn-primary" onclick="saveVideo()">
                        <i class="fa-regular fa-floppy-disk"></i> Save Video
                    </button>
                </div>
                <div id="videoPreview" class="video-preview" style="display: none;"></div>
            </div>
        </div>

        <div id="tab-content" class="tab-content">
            <div class="section-box">
                <h3><i class="fa-regular fa-pen-to-square"></i> Reflection Questions</h3>
                <div class="form-group full-width">
                    <textarea id="questions" placeholder="Enter questions (one per line)" rows="5"></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveQuestions()">
                    <i class="fa-regular fa-floppy-disk"></i> Save Questions
                </button>
            </div>

            <div class="section-box">
                <h3><i class="fa-regular fa-book-open"></i> Reading Passage</h3>
                <div class="form-group full-width">
                    <textarea id="reading" placeholder="Enter reading passage" rows="8"></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveReading()">
                    <i class="fa-regular fa-floppy-disk"></i> Save Reading
                </button>
            </div>

            <div class="section-box">
                <h3><i class="fa-regular fa-lightbulb"></i> Vocabulary</h3>
                <div class="form-group full-width">
                    <textarea id="vocabulary" placeholder="Enter vocabulary (one per line, format: word - definition)" rows="6"></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveVocabulary()">
                    <i class="fa-regular fa-floppy-disk"></i> Save Vocabulary
                </button>
            </div>
        </div>

        <div id="tab-tools" class="tab-content">
            <div class="section-box">
                <h3><i class="fa-regular fa-wifi"></i> Test Connection</h3>
                <div class="btn-group">
                    <button class="btn" onclick="testLessonCode()">
                        <i class="fa-regular fa-flask"></i> Test Lesson Code
                    </button>
                    <button class="btn" onclick="viewSavedData()">
                        <i class="fa-regular fa-eye"></i> View Saved Data
                    </button>
                    <button class="btn btn-primary" onclick="loadCurrentData()">
                        <i class="fa-regular fa-rotate"></i> Refresh from Cloud
                    </button>
                </div>
            </div>

            <div class="section-box">
                <h3><i class="fa-regular fa-right-from-bracket"></i> Session</h3>
                <button class="btn" onclick="logout()">
                    <i class="fa-regular fa-sign-out"></i> Logout
                </button>
            </div>
        </div>

        <div class="timestamp" id="lastUpdated">
            Last saved: Never
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'fluency2026';
        const API_URL = 'https://script.google.com/macros/s/AKfycbzArMYy45vbbSLpwbkA5BowXGO8AxGmIORzE_6SouRakJhN1c4rud9_cEE2znj0vwU/exec';

        let currentData = {
            lessonCode: '1234',
            marks: '5',
            deadline: '',
            videoUrl: 'https://www.youtube.com/embed/D3mNn0btW6s',
            questions: '• What are two main ways technology has improved daily life?\n• Mention one negative effect of technology discussed.\n• How does technology influence communication?',
            reading: 'Technology has transformed almost every aspect of human life over the last few decades. From communication and education to healthcare and entertainment, modern innovations have changed how we live, work, and connect with others. Smartphones, the internet, and artificial intelligence have made information more accessible than ever, allowing people to learn and communicate at a global scale...',
            vocabulary: 'persistence – continuing despite difficulty\nmomentum – force that keeps something moving\nconsistency – doing the same thing regularly\nexposure – contact with something (e.g. language)\ndiscipline – controlled behaviour to achieve a goal'
        };

        let currentTopPerformer = {
            name: 'Hatim',
            points: 71,
            badge: 'Most consistent learner | Phase 1',
            avatar: 'https://i.ibb.co/4RQ0RChK/hatim.jpg'
        };

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.target.closest('.tab-btn').classList.add('active');
        }

        function checkPassword() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadCurrentData();
                showNotification('Welcome, Admin!');
            } else {
                document.getElementById('loginError').innerText = 'Incorrect password';
            }
        }

        function logout() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }

        async function loadCurrentData() {
            try {
                showNotification('Loading data from cloud...');
                const response = await fetch(`${API_URL}?t=${Date.now()}`);
                const result = await response.json();
                
                if (result && result.data) {
                    currentData = {
                        lessonCode: result.data.lessonCode || '1234',
                        marks: result.data.marks || '5',
                        deadline: result.data.deadline || getDefaultDeadline(),
                        videoUrl: result.data.videoUrl || 'https://www.youtube.com/embed/D3mNn0btW6s',
                        questions: result.data.questions || currentData.questions,
                        reading: result.data.reading || currentData.reading,
                        vocabulary: result.data.vocabulary || currentData.vocabulary
                    };
                    
                    // Populate form fields
                    document.getElementById('lessonCode').value = currentData.lessonCode;
                    document.getElementById('marks').value = currentData.marks;
                    document.getElementById('deadline').value = currentData.deadline;
                    document.getElementById('videoUrl').value = currentData.videoUrl;
                    document.getElementById('questions').value = currentData.questions;
                    document.getElementById('reading').value = currentData.reading;
                    document.getElementById('vocabulary').value = currentData.vocabulary;
                }
                
                if (result && result.topPerformer) {
                    currentTopPerformer = {
                        name: result.topPerformer.name || 'Hatim',
                        points: result.topPerformer.points || 71,
                        badge: result.topPerformer.badge || 'Most consistent learner | Phase 1',
                        avatar: result.topPerformer.avatar || 'https://i.ibb.co/4RQ0RChK/hatim.jpg'
                    };
                    
                    document.getElementById('topPerformerName').value = currentTopPerformer.name;
                    document.getElementById('topPerformerPoints').value = currentTopPerformer.points;
                    document.getElementById('topPerformerBadge').value = currentTopPerformer.badge;
                    document.getElementById('topPerformerAvatar').value = currentTopPerformer.avatar;
                    updateAvatarPreview();
                }
                
                updateTimestamp();
                showNotification('Data loaded from cloud successfully!');
            } catch (error) {
                console.error('Error loading data:', error);
                showNotification('Could not load from cloud, using local data');
                loadLocalData();
            }
        }

        function loadLocalData() {
            const savedLesson = localStorage.getItem('fluencyLessonData');
            const savedTop = localStorage.getItem('fluencyTopPerformer');
            
            if (savedLesson) {
                try {
                    const data = JSON.parse(savedLesson);
                    document.getElementById('lessonCode').value = data.lessonCode || '1234';
                    document.getElementById('marks').value = data.marks || '5';
                    document.getElementById('deadline').value = data.deadline || getDefaultDeadline();
                    document.getElementById('videoUrl').value = data.videoUrl || '';
                    document.getElementById('questions').value = data.questions || '';
                    document.getElementById('reading').value = data.reading || '';
                    document.getElementById('vocabulary').value = data.vocabulary || '';
                } catch(e) {}
            }
            
            if (savedTop) {
                try {
                    const tp = JSON.parse(savedTop);
                    document.getElementById('topPerformerName').value = tp.name || 'Hatim';
                    document.getElementById('topPerformerPoints').value = tp.points || 71;
                    document.getElementById('topPerformerBadge').value = tp.badge || 'Most consistent learner | Phase 1';
                    document.getElementById('topPerformerAvatar').value = tp.avatar || 'https://i.ibb.co/4RQ0RChK/hatim.jpg';
                    updateAvatarPreview();
                } catch(e) {}
            }
        }

        async function saveAllToCloud() {
            const lessonData = {
                action: 'saveLesson',
                lessonCode: document.getElementById('lessonCode').value,
                marks: document.getElementById('marks').value,
                deadline: document.getElementById('deadline').value,
                videoUrl: document.getElementById('videoUrl').value,
                questions: document.getElementById('questions').value,
                reading: document.getElementById('reading').value,
                vocabulary: document.getElementById('vocabulary').value,
                lastUpdated: new Date().toISOString()
            };
            
            const topPerformerData = {
                action: 'saveTopPerformer',
                name: document.getElementById('topPerformerName').value,
                points: parseInt(document.getElementById('topPerformerPoints').value) || 0,
                badge: document.getElementById('topPerformerBadge').value,
                avatar: document.getElementById('topPerformerAvatar').value,
                lastUpdated: new Date().toISOString()
            };
            
            const syncStatus = document.getElementById('syncStatus');
            syncStatus.className = 'sync-status syncing';
            syncStatus.innerHTML = '<i class="fa-regular fa-spinner fa-spin"></i> Syncing...';
            syncStatus.style.display = 'flex';
            
            try {
                // Save lesson data
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(lessonData)
                });
                
                // Save top performer data
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(topPerformerData)
                });
                
                // Save to localStorage as backup
                localStorage.setItem('fluencyLessonData', JSON.stringify(lessonData));
                localStorage.setItem('fluencyTopPerformer', JSON.stringify(topPerformerData));
                localStorage.setItem('fluencyLessonCode', lessonData.lessonCode);
                
                syncStatus.className = 'sync-status';
                syncStatus.innerHTML = '<i class="fa-regular fa-check-circle"></i> <span>Synced to cloud!</span>';
                showNotification('All changes saved to cloud!');
                updateTimestamp();
                
                setTimeout(() => {
                    syncStatus.style.display = 'none';
                }, 3000);
            } catch (error) {
                console.error('Error saving:', error);
                syncStatus.className = 'sync-status error';
                syncStatus.innerHTML = '<i class="fa-regular fa-exclamation-circle"></i> <span>Save failed - check connection</span>';
                showNotification('Save failed. Please check your internet connection.');
            }
        }

        async function saveTopPerformer() {
            await saveAllToCloud();
        }
        
        async function saveBasicSettings() {
            await saveAllToCloud();
        }
        
        async function saveVideo() {
            await saveAllToCloud();
        }
        
        async function saveQuestions() {
            await saveAllToCloud();
        }
        
        async function saveReading() {
            await saveAllToCloud();
        }
        
        async function saveVocabulary() {
            await saveAllToCloud();
        }

        function previewTopPerformer() {
            const preview = document.getElementById('topPerformerPreview');
            if (preview.style.display === 'none') {
                document.getElementById('previewName').textContent = document.getElementById('topPerformerName').value;
                document.getElementById('previewPoints').textContent = document.getElementById('topPerformerPoints').value + ' points';
                document.getElementById('previewBadge').textContent = document.getElementById('topPerformerBadge').value;
                document.getElementById('previewAvatar').src = document.getElementById('topPerformerAvatar').value;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        }

        function updateAvatarPreview() {
            const avatarUrl = document.getElementById('topPerformerAvatar').value;
            document.getElementById('adminAvatarPreview').src = avatarUrl;
        }

        function previewVideo() {
            let url = document.getElementById('videoUrl').value;
            let embedUrl = url;
            
            if (url.includes('youtube.com/watch?v=')) {
                const videoId = url.split('v=')[1].split('&')[0];
                embedUrl = `https://www.youtube.com/embed/${videoId}`;
            } else if (url.includes('youtu.be/')) {
                const videoId = url.split('youtu.be/')[1].split('?')[0];
                embedUrl = `https://www.youtube.com/embed/${videoId}`;
            }
            
            const preview = document.getElementById('videoPreview');
            preview.innerHTML = `<iframe src="${embedUrl}" allowfullscreen></iframe>`;
            preview.style.display = 'block';
        }

        function testLessonCode() {
            const code = document.getElementById('lessonCode').value;
            alert(`Current lesson code: ${code}\n\nMake sure this matches the code students need to enter.`);
        }

        function viewSavedData() {
            const lessonCode = document.getElementById('lessonCode').value;
            const topName = document.getElementById('topPerformerName').value;
            const topPoints = document.getElementById('topPerformerPoints').value;
            
            alert(`=== Current Data ===\n\nLesson Code: ${lessonCode}\nMarks: ${document.getElementById('marks').value}\nDeadline: ${document.getElementById('deadline').value}\n\nTop Performer: ${topName}\nPoints: ${topPoints}\nBadge: ${document.getElementById('topPerformerBadge').value}`);
        }

        function getDefaultDeadline() {
            const date = new Date();
            date.setDate(date.getDate() + 2);
            return date.toISOString().split('T')[0];
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `<i class="fa-regular fa-circle-check"></i> ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('liveTimestamp').textContent = now.toLocaleTimeString();
            document.getElementById('lastUpdated').innerHTML = `Last saved: ${now.toLocaleString()}`;
        }

        setInterval(updateTimestamp, 1000);
        
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('deadline').value = getDefaultDeadline();
        });
    </script>
</body>
</html>
